<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFG Derivation & Parse Tree Generator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- D3.js for tree visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-950 text-slate-300 font-sans min-h-screen p-4 md:p-8 selection:bg-purple-500/30">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-purple-400 flex items-center justify-center md:justify-start gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 19v-6" />
                        <path d="M14 19v-6" />
                        <path d="M12 13V8" />
                        <path d="m12 8 4-5" />
                        <path d="m12 8-4-5" />
                        <path d="M10 19a2 2 0 1 0-4 0 2 2 0 0 0 4 0Z" />
                        <path d="M18 19a2 2 0 1 0-4 0 2 2 0 0 0 4 0Z" />
                        <path d="M14 3a2 2 0 1 0-4 0 2 2 0 0 0 4 0Z" />
                    </svg>
                    Advanced CFG Visualizer
                </h1>
                <p class="text-slate-400 mt-2">Generate step-by-step derivations and interactive parse trees.</p>
            </div>

            <!-- Quick Presets Dropdown -->
            <div class="flex items-center gap-3 bg-slate-900 border border-slate-800 p-2 rounded-xl">
                <label for="presetSelector" class="text-sm font-medium text-slate-400 pl-2">Load Example:</label>
                <select id="presetSelector" onchange="loadPreset()"
                    class="bg-slate-800 border-none text-slate-200 text-sm rounded-lg focus:ring-2 focus:ring-purple-500 p-2 cursor-pointer outline-none">
                    <option value="custom">-- Custom Grammar --</option>
                    <option value="palindrome">Palindrome (aba)</option>
                    <option value="math">Math Expression (id+id*id)</option>
                    <option value="parens">Balanced Parentheses</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

            <!-- Left Column: Inputs -->
            <div class="lg:col-span-4 bg-slate-900 p-6 rounded-2xl shadow-lg border border-slate-800 h-fit">
                <h2 class="text-lg font-semibold mb-4 text-slate-200">Grammar Settings</h2>

                <div class="space-y-5">
                    <!-- Grammar Input -->
                    <div>
                        <label for="grammar" class="block text-sm font-medium text-slate-400 mb-2">Production
                            Rules</label>
                        <textarea id="grammar" rows="6"
                            class="w-full p-4 border border-slate-700 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 font-mono text-sm bg-slate-950 text-slate-200 transition-all resize-none shadow-inner leading-relaxed">
S -> a S b
S -> a b
S -> e</textarea>
                        <p class="text-xs text-slate-500 mt-2 leading-tight">
                            Format: <code>LHS -> RHS</code>. Space-separate symbols.<br>
                            Use <code>e</code> for epsilon (empty string).
                        </p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <!-- Target String Input -->
                        <div>
                            <label for="targetString" class="block text-sm font-medium text-slate-400 mb-2">Target
                                String</label>
                            <input type="text" id="targetString" value="aabb"
                                class="w-full p-3 border border-slate-700 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 font-mono text-sm bg-slate-950 text-slate-200 shadow-inner">
                        </div>

                        <!-- Derivation Type -->
                        <div>
                            <label for="derivationType"
                                class="block text-sm font-medium text-slate-400 mb-2">Derivation</label>
                            <select id="derivationType"
                                class="w-full p-3 border border-slate-700 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-slate-950 text-slate-200 shadow-inner cursor-pointer">
                                <option value="leftmost">Leftmost</option>
                                <option value="rightmost">Rightmost</option>
                            </select>
                        </div>
                    </div>

                    <!-- Action Button -->
                    <button onclick="generate()"
                        class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-[0_0_15px_rgba(147,51,234,0.3)] hover:shadow-[0_0_25px_rgba(147,51,234,0.5)] flex justify-center items-center gap-2 mt-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14" />
                            <path d="m12 5 7 7-7 7" />
                        </svg>
                        Compute & Visualize
                    </button>

                    <!-- Error Message -->
                    <div id="error-msg"
                        class="text-sm text-pink-400 font-medium hidden p-4 bg-pink-950/30 border border-pink-900/50 rounded-xl flex items-start gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" class="mt-0.5 shrink-0"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                        <span id="error-text"></span>
                    </div>
                </div>
            </div>

            <!-- Right Column: Outputs -->
            <div class="lg:col-span-8 space-y-6 flex flex-col">

                <!-- Parse Tree Visualizer -->
                <div id="results-tree"
                    class="bg-slate-900 p-6 rounded-2xl shadow-lg border border-slate-800 hidden flex-1 flex flex-col min-h-[500px]">
                    <div class="flex flex-wrap justify-between items-center mb-4 gap-4">
                        <h2 class="text-lg font-semibold text-slate-200 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" class="text-purple-400"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="m18 16 4-4-4-4" />
                                <path d="m6 8-4 4 4 4" />
                                <path d="m14.5 4-5 16" />
                            </svg>
                            Parse Tree
                        </h2>

                        <div class="flex items-center gap-3">
                            <span class="text-xs text-slate-500 hidden sm:inline">Scroll to zoom, drag to pan</span>
                            <button onclick="exportSVG()"
                                class="text-xs font-medium text-purple-300 bg-purple-900/40 hover:bg-purple-800/60 px-3 py-1.5 rounded-lg border border-purple-800 transition-colors flex items-center gap-1.5">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="7 10 12 15 17 10" />
                                    <line x1="12" y1="15" x2="12" y2="3" />
                                </svg>
                                Export SVG
                            </button>
                        </div>
                    </div>
                    <!-- SVG Container -->
                    <div
                        class="border border-slate-800 rounded-xl bg-slate-950 flex-1 relative overflow-hidden shadow-inner cursor-grab active:cursor-grabbing w-full h-[450px]">
                        <div id="tree-container" class="absolute inset-0"></div>
                    </div>
                </div>

                <!-- Derivation Sequence -->
                <div id="results-sequence"
                    class="bg-slate-900 p-6 rounded-2xl shadow-lg border border-slate-800 hidden">
                    <h2 class="text-lg font-semibold mb-4 text-slate-200 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" class="text-teal-400"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 6h16" />
                            <path d="M4 12h16" />
                            <path d="M4 18h7" />
                        </svg>
                        Step-by-Step Derivation
                    </h2>
                    <div class="bg-slate-950 rounded-xl p-5 shadow-inner max-h-[300px] overflow-y-auto">
                        <div id="derivation-output" class="font-mono text-sm space-y-2"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Application Script -->
    <script src="main.js"></script>
</body>

</html>
